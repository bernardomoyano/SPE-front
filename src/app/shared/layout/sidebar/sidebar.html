<aside class="sidebar">
  <div class="sidebar__header">
    <div class="sidebar__brand">
      <app-logo></app-logo>
      <div class="sidebar__brand-text">
        <span class="sidebar__brand-title">S.G.E</span>
        <span class="sidebar__brand-subtitle" *ngIf="userRole === 'COACH'">Coach Dashboard</span>
      </div>
    </div>
  </div>

  <nav class="sidebar__nav">
    <h3 class="sidebar__menu-title">MENÚ</h3>
    <ul class="sidebar__menu">
      <li class="sidebar__menu-item" *ngFor="let item of menuItems">
        <a 
          [routerLink]="item.route" 
          routerLinkActive="sidebar__menu-link--active"
          class="sidebar__menu-link"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>
</aside>

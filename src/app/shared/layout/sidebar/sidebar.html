<aside class="sidebar">
  <nav class="sidebar__nav">
    <h3 class="sidebar__menu-title">MENÚ</h3>
    <ul class="sidebar__menu">
      <li class="sidebar__menu-item" *ngFor="let item of menuItems">
        <ng-container *ngIf="item.children?.length; else singleMenuItem">
          <button
            type="button"
            class="sidebar__menu-link sidebar__menu-link--group"
            [class.sidebar__menu-link--active]="isGroupActive(item)"
            (click)="toggleGroup(item.label)"
          >
            <i [class]="item.icon"></i>
            <span>{{ item.label }}</span>
            <i
              class="pi pi-chevron-down sidebar__chevron"
              [class.sidebar__chevron--open]="isGroupOpen(item.label)"
            ></i>
          </button>

          <ul class="sidebar__submenu" *ngIf="isGroupOpen(item.label)">
            <li class="sidebar__submenu-item" *ngFor="let child of item.children">
              <a
                [routerLink]="child.route"
                routerLinkActive="sidebar__submenu-link--active"
                class="sidebar__submenu-link"
              >
                <i [class]="child.icon"></i>
                <span>{{ child.label }}</span>
              </a>
            </li>
          </ul>
        </ng-container>

        <ng-template #singleMenuItem>
          <a
            [routerLink]="item.route"
            routerLinkActive="sidebar__menu-link--active"
            class="sidebar__menu-link"
          >
            <i [class]="item.icon"></i>
            <span>{{ item.label }}</span>
          </a>
        </ng-template>
      </li>
    </ul>
  </nav>
</aside>

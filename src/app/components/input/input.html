<div class="input-container">
  <label *ngIf="label" class="input-container_label">{{ label }}</label>
  <div class="input-container_field" [class.has-icon]="hasIcon" [class.has-toggle]="hasToggle">
    <img *ngIf="icon" [src]="icon" alt="icon" class="input-container_field_icon">
    <input
      *ngIf="control"
      [type]="inputType"
      [formControl]="control"
      [placeholder]="placeholder"
      [attr.step]="step"
      class="input-container_field_input"
      [class.input-container_field_input--error]="hasError"
    >
    <button *ngIf="type === 'password'" type="button" (click)="togglePasswordVisibility()" class="input-container_field_toggle">
      <img [src]="showPassword ? '/assets/icons/eye-slash.svg' : '/assets/icons/eye-alt.svg'" alt="toggle visibility">
    </button>
  </div>
  <span *ngIf="errorMessage" class="input-container_error">{{ errorMessage }}</span>
</div>

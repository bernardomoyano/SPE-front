<div class="planning-card">
  <div class="planning-card__header">
    <h3 class="planning-card__title">{{ planning.name || 'Sin nombre' }}</h3>
    <span class="planning-card__badge planning-card__badge--{{ planning.status }}">
      {{ getStatusLabel(planning.status) }}
    </span>
  </div>

  <div class="planning-card__body">
    <div class="planning-card__info">
      <div class="planning-card__info-item">
        <span class="planning-card__label">Fecha de inicio</span>
        <span class="planning-card__value">{{ formatDate(planning.startDate) }}</span>
      </div>

      <div class="planning-card__info-item">
        <span class="planning-card__label">Duración</span>
        <span class="planning-card__value">{{ planning.durationWeeks }} semanas</span>
      </div>

      <div class="planning-card__info-item">
        <span class="planning-card__label">Tipo</span>
        <span class="planning-card__value">{{ getTypeLabel(planning.type) }}</span>
      </div>

      <div class="planning-card__info-item" *ngIf="planning.phase">
        <span class="planning-card__label">Fase</span>
        <span class="planning-card__value">{{ planning.phase }}</span>
      </div>
    </div>

    <div class="planning-card__actions">
      <!-- Ver Detalles: siempre para coach; para student solo si ya tiene compra -->
      <button
        *ngIf="!isStudent || hasPaidPurchase"
        class="planning-card__action planning-card__action--details"
        (click)="onViewDetails()"
        aria-label="Ver detalles de planificación"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <span>Ver Detalles</span>
      </button>

      <button
        *ngIf="isStudent && !hasPaidPurchase && !hasPendingManualPurchase && !hasManualPurchaseUnderReview"
        class="planning-card__action planning-card__action--payment"
        (click)="onGoToPayment()"
        aria-label="Ir a pago de planificación"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
        <span>Ir a Pago</span>
      </button>

      <button
        *ngIf="isStudent && hasPendingManualPurchase"
        class="planning-card__action planning-card__action--evidence"
        (click)="onUploadEvidence()"
        aria-label="Subir comprobante de pago"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <span>Subir comprobante</span>
      </button>

      <div
        *ngIf="isStudent && hasManualPurchaseUnderReview"
        class="planning-card__review-status"
        aria-label="Pago bajo revisión"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 6v6l4 2"></path>
        </svg>
        <span>Bajo revisión</span>
      </div>

      <!-- Eliminar: solo para coach -->
      <button
        *ngIf="!isStudent"
        class="planning-card__action planning-card__action--delete"
        (click)="onDelete()"
        aria-label="Eliminar planificación"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        <span>Eliminar</span>
      </button>
    </div>
  </div>
</div>

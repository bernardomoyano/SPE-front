<div class="register-container">
    <div class="register-mobile-header">
        <app-logo></app-logo>
        <div class="register-mobile-header_title">
            <p>S.G.E</p>
            <p>Sistema de Gestión de Entrenamiento</p>
        </div>
        <div class="register-mobile-header_slogan">
            <p>Entrená con orden.</p>
            <p>Gestioná con calidad.</p>
        </div>
    </div>
    <div class="register-container_left">
        <app-left></app-left>
    </div>
    <div class="register-container_right">
        <div class="register-container_right_content">
            <div>
            <div class="register-container_right_welcome">
            <p class="register-container_right_welcome_title">Regístrate</p>
            <p class="register-container_right_welcome_subtitle">Crea tu cuenta como entrenador para comenzar a gestionar tus entrenamientos</p>
        </div>
        <div class="register-container_right_form">
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                <app-input label="Nombre" type="text" placeholder="Ingresa tu nombre" icon="assets/icons/person.svg" [control]="nameControl"></app-input>
                <app-input label="Correo electrónico" type="email" placeholder="Ingresa tu correo" icon="/assets/icons/mail.svg" [control]="emailControl" [backendError]="emailDuplicateError"></app-input>
                <app-input label="Especialidad" type="text" placeholder="Ingresa tu especialidad" icon="assets/icons/person.svg" [control]="specialityControl"></app-input>
                <app-input label="Teléfono" type="text" placeholder="Ingresa tu teléfono" icon="assets/icons/phone.svg" [control]="phoneControl" [backendError]="phoneDuplicateError"></app-input>
                <app-input label="País" type="text" placeholder="Ingresa tu país" icon="assets/icons/world.svg" [control]="countryControl"></app-input>
                <app-input label="Contraseña" type="password" placeholder="Ingresa tu contraseña" icon="/assets/icons/padlock.svg" [control]="passwordControl"></app-input>
                <app-input label="Confirmar contraseña" type="password" placeholder="Confirma tu contraseña" icon="/assets/icons/padlock.svg" [control]="confirmPasswordControl"></app-input>
                <div>
                    <app-button label="Registrarse" type="submit" variant="primary" [disabled]="isLoading || !registerForm.valid"></app-button>
                </div>
            </form>
        </div>
        <div class="register-container_right_separator">
            <hr>
        </div>
        <div class="register-container_right_register">
            <p>¿Tienes cuenta? <a routerLink="/login"><b>Iníciate sesión</b></a></p>
        </div>
        </div>
        </div>
    </div>
</div>

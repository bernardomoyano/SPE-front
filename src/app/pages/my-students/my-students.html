<div class="my-students">
  <div class="my-students__header">
    <h1 class="my-students__title">Mis Atletas</h1>
    <app-button
      label="Nuevo Atleta"
      variant="primary"
      (click)="openFormModal()"
    ></app-button>
  </div>

  <app-student-filters
    (filterChange)="onFilterChange($event)"
  ></app-student-filters>

  <div class="my-students__content">
    <app-data-table
      [config]="tableConfig"
      [data]="students()"
      [loading]="loading()"
      [currentPage]="filters.pageNumber"
      [totalItems]="totalItems()"
      (pageChange)="onPageChange($event)"
      (sortChange)="onSortChange($event)"
    ></app-data-table>
  </div>
</div>

<!-- Modal para crear nuevo estudiante -->
@if (showFormModal()) {
  <div class="my-students__modal-overlay" (click)="closeFormModal()">
    <div class="my-students__modal-content" (click)="$event.stopPropagation()">
      <app-form-student (close)="closeFormModal()"></app-form-student>
    </div>
  </div>
}
